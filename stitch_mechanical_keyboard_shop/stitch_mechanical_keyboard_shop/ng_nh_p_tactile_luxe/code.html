<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - TACTILE LUXE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#e6e8ea",
                        "tertiary-fixed": "#d8e2ff",
                        "inverse-surface": "#2d3133",
                        "secondary-fixed-dim": "#bec6e0",
                        "tertiary-container": "#2372e5",
                        "secondary": "#565e74",
                        "primary-fixed": "#f8d8ff",
                        "on-background": "#191c1e",
                        "surface-tint": "#9900cf",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-secondary-fixed": "#131b2e",
                        "primary": "#9700cd",
                        "outline-variant": "#d4c0d7",
                        "primary-fixed-dim": "#ecb2ff",
                        "on-tertiary-fixed": "#001a42",
                        "surface-variant": "#e0e3e5",
                        "on-surface-variant": "#514255",
                        "secondary-fixed": "#dae2fd",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed-dim": "#adc6ff",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#ffffff",
                        "on-secondary-container": "#5c647a",
                        "surface": "#f7f9fb",
                        "primary-container": "#bd00ff",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary-container": "#dae2fd",
                        "on-primary": "#ffffff",
                        "tertiary": "#0059c0",
                        "on-tertiary-fixed-variant": "#004395",
                        "inverse-on-surface": "#eff1f3",
                        "surface-dim": "#d8dadc",
                        "on-primary-container": "#ffffff",
                        "background": "#f7f9fb",
                        "inverse-primary": "#ecb2ff",
                        "on-primary-fixed-variant": "#74009f",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#320047",
                        "outline": "#837186",
                        "surface-bright": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "surface-container-highest": "#e0e3e5",
                        "on-surface": "#191c1e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-desktop": "40px",
                        "gutter": "24px",
                        "md": "24px",
                        "sm": "16px",
                        "margin-mobile": "16px",
                        "lg": "48px",
                        "xs": "8px",
                        "xl": "80px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "body-md": ["Geist"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-md": ["Geist"],
                        "display-lg-mobile": ["Geist"],
                        "body-lg": ["Geist"],
                        "display-lg": ["Geist"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],

                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]

                }
            }
        }

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid #E2E8F0;
        }
        
        .input-glow:focus {
            border-color: #bd00ff;
            box-shadow: 0 0 0 2px rgba(189, 0, 255, 0.2);
            outline: none;
        }

        .btn-primary {
            background-color: #bd00ff;
            color: #ffffff;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 14px 0 rgba(189, 0, 255, 0.39);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Area (Login Form) -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Abstract Background Decorative Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute -top-[20%] -right-[10%] w-[50%] h-[60%] rounded-full bg-primary-fixed-dim/20 blur-3xl opacity-50 mix-blend-multiply"></div>
<div class="absolute -bottom-[20%] -left-[10%] w-[40%] h-[50%] rounded-full bg-tertiary-fixed-dim/20 blur-3xl opacity-50 mix-blend-multiply"></div>
</div>
<!-- Login Container -->
<div class="glass-panel w-full max-w-md rounded-xl p-lg relative z-10 shadow-[0_10px_15px_-3px_rgba(15,23,42,0.08)]">
<!-- Header -->
<div class="text-center mb-lg">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg tracking-tighter text-primary mb-sm">TACTILE LUXE</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to your precision workspace.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-gutter" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md input-glow transition-all" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-xs">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors underline-offset-4 hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg py-sm pl-xl pr-sm font-body-md text-body-md input-glow transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full btn-primary rounded-lg py-sm px-md font-headline-md text-headline-md flex justify-center items-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined" style="font-size: 24px;">arrow_forward</span>
</button>
</div>
<!-- Register Link -->
<div class="text-center pt-md border-t border-outline-variant/50">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-headline-md text-[16px] text-primary hover:text-primary-fixed-dim transition-colors underline underline-offset-4" href="#">Create new account</a>
</p>
</div>
</form>
</div>
</main>
</body></html>
