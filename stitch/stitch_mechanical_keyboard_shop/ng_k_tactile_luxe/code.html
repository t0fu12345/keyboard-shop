<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Navbar Suppressed due to Transactional Page Rule -->
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop w-full max-w-[1440px] mx-auto">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="text-center mb-lg">
<a class="font-display-lg text-display-lg tracking-tighter text-primary inline-block mb-sm" href="#">
                    TACTILE LUXE
                </a>
<h1 class="font-headline-md text-headline-md text-on-surface">Tạo tài khoản</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Tham gia cộng đồng bàn phím cơ chuyên nghiệp</p>
</div>
<!-- Registration Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-md md:p-lg border border-outline-variant shadow-[0_10px_15px_-3px_rgba(15,23,42,0.08)]">
<form action="#" class="space-y-sm" method="POST">
<!-- Full Name -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="fullname">Họ và tên</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-surface-variant rounded focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all font-body-md text-body-md text-on-surface placeholder:text-outline outline-none" id="fullname" name="fullname" placeholder="Nhập họ và tên" required="" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-surface-variant rounded focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all font-body-md text-body-md text-on-surface placeholder:text-outline outline-none" id="email" name="email" placeholder="Nhập địa chỉ email" required="" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="password">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-surface-variant rounded focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all font-body-md text-body-md text-on-surface placeholder:text-outline outline-none" id="password" name="password" placeholder="Tạo mật khẩu" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-xs" for="confirm_password">Xác nhận mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">lock_reset</span>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-surface-variant rounded focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all font-body-md text-body-md text-on-surface placeholder:text-outline outline-none" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start mt-md">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-surface-variant text-primary-container focus:ring-primary-container bg-surface-container-lowest" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-xs text-sm">
<label class="font-body-md text-body-md text-on-surface-variant text-sm leading-tight" for="terms">
                                Tôi đồng ý với <a class="text-primary hover:underline transition-all" href="#">Điều khoản dịch vụ</a> và <a class="text-primary hover:underline transition-all" href="#">Chính sách bảo mật</a> của TACTILE LUXE.
                            </label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary-container font-label-sm text-label-sm py-sm px-md rounded hover:scale-[1.02] hover:shadow-[0_0_15px_rgba(189,0,255,0.4)] transition-all duration-200 flex justify-center items-center gap-xs" type="submit">
<span>Tạo tài khoản</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
<!-- Alternative Registration (Bento style divider) -->
<div class="mt-md pt-md border-t border-surface-variant relative text-center">
<span class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-surface-container-lowest px-sm font-label-sm text-label-sm text-outline">HOẶC</span>
<div class="grid grid-cols-2 gap-sm mt-sm">
<button class="flex items-center justify-center gap-xs py-xs px-sm border border-surface-variant rounded bg-surface-container-lowest hover:bg-surface-container-low transition-colors font-label-sm text-label-sm text-on-surface" type="button">
<img class="w-4 h-4" data-alt="A stylized vector icon of a G representing a technology company logo, highly detailed, minimalist, precise vectors, crisp colors, set against a pristine white background. High resolution, corporate modern aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAA8eBVGHvBN4oBZOnwpbd6hBiSIRJnSdpiujVVJ7a7S6nPmtJcYRGQMNsgxCtC2h4TO83OEtGxVyqaSMGaAyp9lae47TPG3Zfv5AHzc41SD4-awADInkJV77rnrbJUfEMgKUOKUQ8UyEWMq8Vvtzw2WDcYQaWaWcsGXYmNGoD5L_aiT5tNAF-0dTbOSe_OG7sfwh9ZpHkMH2lzC9nD2qXIvNAPJ-uP8X1sPjmkWelDhHrjuUXQ8sTKcZPnYhRiTPkopS2gMzN9FzM"/>
                                Google
                            </button>
<button class="flex items-center justify-center gap-xs py-xs px-sm border border-surface-variant rounded bg-surface-container-lowest hover:bg-surface-container-low transition-colors font-label-sm text-label-sm text-on-surface" type="button">
<img class="w-4 h-4" data-alt="A stylized vector icon of an apple, highly detailed, minimalist, precise vectors, crisp colors, set against a pristine white background. High resolution, corporate modern aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBB99f9i9MSmqhr7qigQYFQM1dA2d23kPWGpT-j--g8vK8Rf76r_a6Co-CCvwQuw2C0910DInXU_-fOsYYv4iilNk_dNec-jmycMfBSTL3j9r_azqd6Bz4T_rgZtbReGWGvGfpjDzYseSqWKMm_XMkM_L_zdUmUHxICRPxt_vRnFaaqOGw03EDjSp1OU1DgpLX5_UZvNxeYKsd9LW3CUQDzyuT5QQnByd7zYxYUEaljAgBHTRoC3pn2EH5RyuQfklewr-an0HPj6NI"/>
                                Apple
                            </button>
</div>
</div>
</form>
<div class="mt-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant text-sm">
                        Đã có tài khoản? <a class="text-primary hover:underline font-bold transition-all" href="#">Đăng nhập ngay</a>
</p>
</div>
